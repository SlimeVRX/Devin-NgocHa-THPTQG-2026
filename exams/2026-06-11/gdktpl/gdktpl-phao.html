<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GDKTPL-Tok 📈⚖️ Tổng ôn GDKTPL cho Hà</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,500&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --display: 'Bricolage Grotesque', system-ui, sans-serif;
    --body: 'Be Vietnam Pro', system-ui, sans-serif;
    --italic: 'Fraunces', Georgia, serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  html, body { height:100%; overflow:hidden; font-family:var(--body); background:#0a0a0a; color:#fff; -webkit-font-smoothing:antialiased; }

  .app {
    position:relative; height:100vh; width:100vw;
    max-width:480px; margin:0 auto;
    background:#000; overflow:hidden;
    box-shadow:0 0 80px rgba(0,0,0,.6);
  }

  .topbar {
    position:absolute; top:0; left:0; right:0; z-index:50;
    padding:14px 18px 10px;
    background:linear-gradient(to bottom, rgba(0,0,0,.55), transparent);
    pointer-events:none;
  }
  .topbar-tabs {
    display:flex; justify-content:center; gap:22px;
    font-family:var(--display); font-weight:700; font-size:16px;
    color:rgba(255,255,255,.55);
  }
  .topbar-tabs .active { color:#fff; position:relative; }
  .topbar-tabs .active::after {
    content:''; position:absolute; left:50%; transform:translateX(-50%);
    bottom:-6px; width:18px; height:3px; background:#fff; border-radius:2px;
  }
  .progress {
    position:absolute; top:48px; left:14px; right:14px;
    display:flex; gap:3px; z-index:50;
  }
  .progress span {
    flex:1; height:2.5px; background:rgba(255,255,255,.25); border-radius:2px;
    transition:background .3s;
  }
  .progress span.done, .progress span.current { background:#fff; }

  .feed {
    height:100%; overflow-y:scroll;
    scroll-snap-type:y mandatory; scroll-behavior:smooth;
    -webkit-overflow-scrolling:touch;
  }
  .feed::-webkit-scrollbar { display:none; }

  .card {
    height:100vh; width:100%;
    scroll-snap-align:start; scroll-snap-stop:always;
    position:relative; overflow:hidden;
    display:flex; flex-direction:column;
    padding:80px 22px 110px;
  }
  .card-bg { position:absolute; inset:0; z-index:0; }
  .card-content { position:relative; z-index:2; flex:1; display:flex; flex-direction:column; justify-content:center; }

  .blob {
    position:absolute; border-radius:50%; filter:blur(40px);
    opacity:.65; z-index:1;
  }
  .grain {
    position:absolute; inset:0; z-index:1; pointer-events:none; opacity:.08;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' /%3E%3C/svg%3E");
  }

  /* Decorative SVG layer for econ vibe */
  .deco-graph {
    position:absolute; right:-20px; top:80px; z-index:1;
    width:200px; height:130px; opacity:.18;
    pointer-events:none;
  }

  .hero-icon {
    font-size:108px; line-height:1;
    text-align:center; margin-bottom:14px;
    filter:drop-shadow(0 8px 24px rgba(0,0,0,.4));
    animation:bobble 3s ease-in-out infinite;
  }
  @keyframes bobble {
    0%,100% { transform:translateY(0) rotate(-2deg); }
    50% { transform:translateY(-10px) rotate(2deg); }
  }
  .kicker {
    font-family:var(--display); font-weight:700;
    font-size:12px; letter-spacing:.18em; text-transform:uppercase;
    opacity:.75; margin-bottom:10px; text-align:center;
  }
  .title {
    font-family:var(--display);
    font-weight:800; font-size:36px; line-height:1.04;
    letter-spacing:-.02em;
    text-align:center;
    margin-bottom:18px;
  }
  .title .em { font-family:var(--italic); font-style:italic; font-weight:500; }

  .body {
    font-size:15px; line-height:1.55;
    text-align:left;
    max-width:400px; margin:0 auto; width:100%;
  }
  .body p { margin-bottom:10px; }
  .body ul { list-style:none; padding:0; }
  .body li {
    padding:9px 13px; margin-bottom:7px;
    background:rgba(255,255,255,.13);
    backdrop-filter:blur(8px);
    border-radius:13px;
    border:1px solid rgba(255,255,255,.18);
  }
  .body li b { font-weight:700; }
  .body code {
    font-family:var(--mono); font-size:13.5px;
    background:rgba(0,0,0,.4);
    padding:2px 6px; border-radius:5px;
    color:#ffec99;
  }
  .body .formula {
    background:rgba(0,0,0,.4);
    padding:13px 15px; border-radius:13px;
    font-family:var(--display); font-weight:600;
    text-align:center; font-size:14.5px;
    border:1px dashed rgba(255,255,255,.4);
    margin:8px 0;
    color:#fff;
  }
  .body .example {
    background:rgba(255,255,255,.08);
    padding:10px 13px; border-radius:12px;
    border-left:3px solid #fff;
    font-style:italic; font-size:13.5px;
    margin:6px 0;
  }
  .body .warn {
    background:rgba(255,200,0,.15);
    padding:10px 13px; border-radius:12px;
    border-left:3px solid #ffec99;
    font-size:13.5px; margin:8px 0;
  }
  .body .tag-row {
    display:flex; gap:7px; flex-wrap:wrap; justify-content:center;
    margin-top:12px;
  }
  .body .tag-row span {
    padding:6px 12px; border-radius:999px;
    background:rgba(255,255,255,.18);
    font-size:12.5px; font-weight:600;
    border:1px solid rgba(255,255,255,.25);
  }

  /* Compare cards (vs) */
  .vs-grid {
    display:grid; grid-template-columns:1fr auto 1fr;
    gap:8px; align-items:stretch;
  }
  .vs-col {
    padding:12px 11px; background:rgba(255,255,255,.13);
    border-radius:13px; border:1px solid rgba(255,255,255,.2);
    font-size:13px; line-height:1.4;
  }
  .vs-col h4 {
    font-family:var(--display); font-weight:800; font-size:14.5px;
    margin-bottom:6px;
  }
  .vs-divider {
    display:flex; align-items:center; justify-content:center;
    font-family:var(--display); font-weight:800; font-size:18px;
    color:rgba(255,255,255,.85);
  }

  /* Data rows */
  .data-table { display:flex; flex-direction:column; gap:6px; margin-top:6px; }
  .data-row {
    display:flex; gap:10px; padding:9px 12px;
    background:rgba(255,255,255,.13); border-radius:11px;
    border:1px solid rgba(255,255,255,.18);
    font-size:13px; line-height:1.4; align-items:flex-start;
  }
  .data-row b { min-width:75px; font-weight:700; flex-shrink:0; color:#ffec99; font-family:var(--mono); }
  .data-row .meaning { flex:1; }

  /* RIGHT SIDE ACTIONS */
  .actions {
    position:absolute; right:14px; bottom:130px; z-index:10;
    display:flex; flex-direction:column; gap:22px;
    align-items:center;
  }
  .action { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; }
  .action-btn {
    width:50px; height:50px;
    background:rgba(0,0,0,.25);
    backdrop-filter:blur(8px);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:24px; line-height:1;
    transition:transform .2s;
    border:1px solid rgba(255,255,255,.1);
  }
  .action-btn:active { transform:scale(.85); }
  .action.liked .action-btn { background:rgba(255,40,80,.85); }
  .action.liked .action-btn svg { fill:#fff; }
  .action-count { font-size:12px; font-weight:700; text-shadow:0 1px 3px rgba(0,0,0,.6); }
  .avatar {
    width:50px; height:50px; border-radius:50%;
    background:linear-gradient(135deg, #38ef7d, #11998e);
    border:2px solid #fff; position:relative;
    display:flex; align-items:center; justify-content:center;
    font-size:22px;
  }
  .avatar-plus {
    position:absolute; bottom:-7px; left:50%; transform:translateX(-50%);
    width:18px; height:18px; border-radius:50%;
    background:#ff2d55; color:#fff; font-size:14px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
  }

  .caption {
    position:absolute; left:14px; right:80px; bottom:24px; z-index:10;
  }
  .caption .author { font-weight:700; font-size:15px; margin-bottom:6px; }
  .caption .text { font-size:14px; line-height:1.4; opacity:.92; margin-bottom:6px; }
  .caption .hashtags { font-size:13px; opacity:.85; font-weight:600; }
  .caption .hashtags span { margin-right:6px; }

  .burst {
    position:absolute; pointer-events:none;
    font-size:80px; z-index:30;
    animation:burst .8s ease-out forwards;
  }
  @keyframes burst {
    0% { transform:scale(.4) rotate(-10deg); opacity:0; }
    30% { transform:scale(1.3) rotate(8deg); opacity:1; }
    100% { transform:scale(1.6) rotate(0); opacity:0; }
  }

  .swipe-hint {
    position:absolute; bottom:140px; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:8px;
    z-index:10; pointer-events:none;
  }
  .swipe-hint .finger { font-size:32px; animation:swipeUp 1.6s ease-in-out infinite; }
  @keyframes swipeUp {
    0%,100% { transform:translateY(10px); opacity:.4; }
    50% { transform:translateY(-15px); opacity:1; }
  }
  .swipe-hint .label {
    font-family:var(--display); font-weight:700; font-size:14px;
    letter-spacing:.05em;
  }

  /* QUIZ */
  .quiz-badge {
    display:inline-block; padding:6px 14px; border-radius:999px;
    background:rgba(255,255,255,.2); border:1px solid rgba(255,255,255,.3);
    font-family:var(--display); font-weight:700; font-size:12px;
    letter-spacing:.15em; margin-bottom:14px; align-self:flex-start;
  }
  .quiz-q {
    font-family:var(--display); font-weight:700;
    font-size:19px; line-height:1.3; margin-bottom:16px;
    text-align:left;
  }
  .quiz-q .em { font-family:var(--italic); font-style:italic; font-weight:500; }
  .quiz-q b { color:#ffec99; }
  .quiz-options { display:flex; flex-direction:column; gap:9px; }
  .quiz-opt {
    padding:12px 14px; border-radius:13px;
    background:rgba(255,255,255,.15);
    border:2px solid rgba(255,255,255,.2);
    backdrop-filter:blur(8px);
    font-weight:600; font-size:13.5px;
    text-align:left; line-height:1.35;
    cursor:pointer; transition:all .25s;
    display:flex; align-items:center; gap:10px;
  }
  .quiz-opt .opt-letter {
    width:26px; height:26px; border-radius:50%;
    background:rgba(255,255,255,.2);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--display); font-weight:700; font-size:12px;
    flex-shrink:0;
  }
  .quiz-opt:active { transform:scale(.97); }
  .quiz-opt.correct { background:rgba(0,200,100,.45); border-color:#0eff8e; }
  .quiz-opt.correct .opt-letter { background:#0eff8e; color:#000; }
  .quiz-opt.wrong { background:rgba(255,60,80,.45); border-color:#ff4060; }
  .quiz-opt.wrong .opt-letter { background:#ff4060; color:#fff; }
  .quiz-opt.disabled { pointer-events:none; opacity:.55; }
  .quiz-feedback {
    margin-top:12px; padding:11px 14px;
    background:rgba(0,0,0,.4); border-radius:12px;
    font-size:13px; line-height:1.5;
    border-left:3px solid #0eff8e;
    display:none;
  }
  .quiz-feedback.show { display:block; animation:fadeIn .4s ease; }
  .quiz-feedback.wrong { border-left-color:#ff4060; }
  @keyframes fadeIn { from{opacity:0; transform:translateY(8px);} to{opacity:1;} }

  /* SECTION DIVIDER */
  .section-card { justify-content:center !important; padding:80px 22px !important; }
  .section-card .card-content { justify-content:center; text-align:center; }
  .section-card .big-num {
    font-family:var(--display); font-weight:800; font-size:140px;
    line-height:1; opacity:.4; margin-bottom:10px;
  }

  .confetti {
    position:absolute; top:-20px; width:10px; height:14px;
    z-index:5; opacity:.9;
    animation:fall linear forwards;
  }
  @keyframes fall { to { transform:translateY(110vh) rotate(720deg); } }

  .scroll-hint {
    position:absolute; bottom:96px; left:50%; transform:translateX(-50%);
    font-size:22px; opacity:.45; z-index:9;
    animation:bobble 2s ease-in-out infinite;
    pointer-events:none;
  }

  .marquee {
    position:absolute; top:50%; left:-10%; right:-10%;
    transform:translateY(-50%) rotate(-6deg);
    font-family:var(--display); font-weight:800;
    font-size:140px; line-height:.9;
    color:rgba(255,255,255,.08);
    white-space:nowrap; pointer-events:none; z-index:1;
    letter-spacing:-.04em;
  }

  /* Number badge for "indicator" cards */
  .indicator-card {
    display:flex; flex-direction:column; gap:8px; margin-top:6px;
  }
  .indicator-row {
    display:flex; gap:12px; align-items:center;
    background:rgba(255,255,255,.13); padding:11px 13px;
    border-radius:13px; border:1px solid rgba(255,255,255,.2);
  }
  .indicator-icon {
    width:42px; height:42px; border-radius:10px;
    background:rgba(0,0,0,.35);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; flex-shrink:0;
  }
  .indicator-text { flex:1; font-size:13px; line-height:1.4; }
  .indicator-text b { font-family:var(--mono); color:#ffec99; }

  @media (max-width:380px) {
    .title { font-size:30px; }
    .hero-icon { font-size:88px; }
    .body { font-size:14px; }
    .quiz-q { font-size:17px; }
  }
</style>
</head>

/* ============= RENDER ============= */
const feed = document.getElementById('feed');
const progressBar = document.getElementById('progress');

const randCount = (min, max) => {
  const n = Math.floor(Math.random()*(max-min)+min);
  if (n > 1000) return (n/1000).toFixed(1)+'K';
  return n.toString();
};

function makeBlobs(blobs=[]) {
  if (!blobs.length) {
    return `<div class="blob" style="background:rgba(255,255,255,.3); width:200px; height:200px; left:-50px; top:-50px"></div>
            <div class="blob" style="background:rgba(0,0,0,.2); width:300px; height:300px; right:-100px; bottom:-100px"></div>`;
  }
  return blobs.map(b => `<div class="blob" style="background:${b.c}; width:${b.s}; height:${b.s}; left:${b.x}; top:${b.y}"></div>`).join('');
}

function renderCard(c, idx) {
  const likes = randCount(800, 25000);
  const saves = randCount(200, 8000);
  const shares = randCount(50, 2000);

  if (c.type === 'intro' || c.type === 'concept' || c.type === 'finale') {
    return `
      <div class="card" data-idx="${idx}">
        <div class="card-bg" style="background:${c.bg}"></div>
        ${makeBlobs(c.blobs)}
        ${c.deco || ''}
        <div class="grain"></div>
        ${c.type === 'finale' ? makeConfetti() : ''}
        <div class="card-content">
          <div class="hero-icon">${c.icon}</div>
          ${c.kicker ? `<div class="kicker">${c.kicker}</div>` : ''}
          <h2 class="title">${c.title}</h2>
          <div class="body">${typeof c.body === 'string' && c.body.startsWith('<') ? c.body : `<p>${c.body}</p>`}</div>
        </div>
        ${c.hint ? `<div class="swipe-hint"><div class="finger">👆</div><div class="label">VUỐT LÊN</div></div>` : `<div class="scroll-hint">⌃</div>`}
        ${renderActions(c, idx, likes, saves, shares)}
        ${renderCaption(c)}
      </div>`;
  }

  if (c.type === 'section') {
    return `
      <div class="card section-card" data-idx="${idx}">
        <div class="card-bg" style="background:${c.bg}"></div>
        <div class="marquee">${c.title.replace(/<[^>]+>/g,' ')} • ${c.title.replace(/<[^>]+>/g,' ')} •</div>
        <div class="grain"></div>
        <div class="card-content">
          <div class="big-num">${c.bigNum}</div>
          <div class="kicker">${c.kicker}</div>
          <h2 class="title">${c.title}</h2>
          <div class="body" style="text-align:center;"><p>${c.body}</p></div>
        </div>
        <div class="scroll-hint">⌃</div>
        ${renderActions(c, idx, likes, saves, shares)}
        ${renderCaption(c)}
      </div>`;
  }

  if (c.type === 'quiz') {
    return `
      <div class="card" data-idx="${idx}">
        <div class="card-bg" style="background:${c.bg}"></div>
        ${makeBlobs()}
        <div class="grain"></div>
        <div class="card-content" style="justify-content:flex-start; padding-top:20px;">
          <div class="quiz-badge">⚡ QUIZ TIME</div>
          <h3 class="quiz-q">${c.question}</h3>
          <div class="quiz-options">
            ${c.options.map((o,i) => `
              <div class="quiz-opt" data-correct="${o.correct}" data-idx="${idx}">
                <span class="opt-letter">${String.fromCharCode(65+i)}</span>
                <span>${o.t}</span>
              </div>`).join('')}
          </div>
          <div class="quiz-feedback" id="fb-${idx}">${c.explain}</div>
        </div>
        <div class="scroll-hint">⌃</div>
        ${renderActions(c, idx, likes, saves, shares)}
        ${renderCaption(c)}
      </div>`;
  }
}

function renderActions(c, idx, likes, saves, shares) {
  return `
    <div class="actions">
      <div class="avatar">📈<div class="avatar-plus">+</div></div>
      <div class="action" data-action="like" data-idx="${idx}">
        <div class="action-btn">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="2">
            <path d="M12 21s-7-4.35-9.5-9.5C.5 7 4 4 7 4c2 0 3.5 1 5 3 1.5-2 3-3 5-3 3 0 6.5 3 4.5 7.5C19 16.65 12 21 12 21z" fill="rgba(255,255,255,0)"/>
          </svg>
        </div>
        <div class="action-count">${likes}</div>
      </div>
      <div class="action" data-action="save" data-idx="${idx}">
        <div class="action-btn">🔖</div>
        <div class="action-count">${saves}</div>
      </div>
      <div class="action" data-action="comment" data-idx="${idx}">
        <div class="action-btn">💬</div>
        <div class="action-count">${randCount(20,800)}</div>
      </div>
      <div class="action" data-action="share" data-idx="${idx}">
        <div class="action-btn">↗️</div>
        <div class="action-count">${shares}</div>
      </div>
    </div>
  `;
}

function renderCaption(c) {
  return `
    <div class="caption">
      <div class="author">${c.author}</div>
      <div class="text">${c.captionText}</div>
      <div class="hashtags">${(c.tags||[]).map(t => `<span>${t}</span>`).join('')}</div>
    </div>
  `;
}

function makeConfetti() {
  const colors = ['#ff006e','#ffbe0b','#8338ec','#3a86ff','#06ffa5','#fb5607'];
  let html = '';
  for (let i = 0; i < 30; i++) {
    const left = Math.random()*100;
    const delay = Math.random()*2;
    const dur = 2 + Math.random()*2;
    const color = colors[Math.floor(Math.random()*colors.length)];
    const rot = Math.random()*360;
    html += `<div class="confetti" style="left:${left}%; background:${color}; animation-duration:${dur}s; animation-delay:${delay}s; transform:rotate(${rot}deg)"></div>`;
  }
  return html;
}

feed.innerHTML = CARDS.map(renderCard).join('');
progressBar.innerHTML = CARDS.map((_,i) => `<span data-i="${i}"></span>`).join('');
const progressDots = progressBar.querySelectorAll('span');

feed.addEventListener('click', (e) => {
  const action = e.target.closest('.action');
  if (action) {
    const type = action.dataset.action;
    if (type === 'like') {
      action.classList.toggle('liked');
      const svg = action.querySelector('svg path');
      if (action.classList.contains('liked')) {
        svg.setAttribute('fill','#fff');
        const countEl = action.querySelector('.action-count');
        const oldC = countEl.textContent;
        countEl.textContent = typeof oldC === 'string' && oldC.includes('K')
          ? (parseFloat(oldC) + 0.1).toFixed(1)+'K'
          : (parseInt(oldC.replace(/[^\d]/g,''))+1).toLocaleString();
        const burst = document.createElement('div');
        burst.className = 'burst';
        burst.textContent = '💖';
        const rect = action.getBoundingClientRect();
        burst.style.left = (rect.left - 30) + 'px';
        burst.style.top = (rect.top - 30) + 'px';
        document.body.appendChild(burst);
        setTimeout(() => burst.remove(), 800);
      } else {
        svg.setAttribute('fill','rgba(255,255,255,0)');
      }
    } else if (type === 'save') {
      action.classList.toggle('liked');
      const btn = action.querySelector('.action-btn');
      btn.textContent = action.classList.contains('liked') ? '✅' : '🔖';
    } else if (type === 'share') {
      showToast('Đã copy link gửi cho Hà 💌');
    } else if (type === 'comment') {
      showToast('Comments đang chill...');
    }
    return;
  }

  const opt = e.target.closest('.quiz-opt');
  if (opt && !opt.classList.contains('disabled')) {
    const correct = opt.dataset.correct === 'true';
    const idx = opt.dataset.idx;
    const parent = opt.parentElement;
    parent.querySelectorAll('.quiz-opt').forEach(o => {
      o.classList.add('disabled');
      if (o.dataset.correct === 'true') o.classList.add('correct');
    });
    if (!correct) opt.classList.add('wrong');
    const feedback = document.getElementById('fb-'+idx);
    feedback.classList.add('show');
    if (!correct) feedback.classList.add('wrong');
    if (correct) {
      const burst = document.createElement('div');
      burst.className = 'burst';
      burst.textContent = '🎉';
      burst.style.left = '50%';
      burst.style.top = '40%';
      burst.style.transform = 'translateX(-50%)';
      document.body.appendChild(burst);
      setTimeout(() => burst.remove(), 800);
    }
  }
});

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = `
    position:fixed; bottom:120px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,.85); color:#fff; padding:10px 18px;
    border-radius:999px; font-size:13px; font-weight:600;
    z-index:100; backdrop-filter:blur(8px);
    animation:fadeIn .25s ease;
  `;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; }, 1600);
  setTimeout(() => t.remove(), 2000);
}

let lastTap = 0;
feed.addEventListener('click', (e) => {
  if (e.target.closest('.action') || e.target.closest('.quiz-opt')) return;
  const now = Date.now();
  if (now - lastTap < 300) {
    const card = e.target.closest('.card');
    if (!card) return;
    const likeAction = card.querySelector('[data-action="like"]');
    if (likeAction && !likeAction.classList.contains('liked')) {
      likeAction.click();
    }
    const burst = document.createElement('div');
    burst.className = 'burst';
    burst.textContent = '❤️';
    burst.style.left = (e.clientX - 40) + 'px';
    burst.style.top = (e.clientY - 40) + 'px';
    burst.style.fontSize = '100px';
    document.body.appendChild(burst);
    setTimeout(() => burst.remove(), 800);
  }
  lastTap = now;
});

feed.addEventListener('scroll', () => {
  const idx = Math.round(feed.scrollTop / window.innerHeight);
  progressDots.forEach((d, i) => {
    d.classList.toggle('done', i < idx);
    d.classList.toggle('current', i === idx);
  });
});

progressDots[0]?.classList.add('current');
</script>
